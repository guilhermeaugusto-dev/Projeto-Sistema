<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patrimônio</title>
  <link rel="stylesheet" href="patrimonio.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/izitoast/dist/css/iziToast.min.css">
  <script src="https://cdn.jsdelivr.net/npm/izitoast/dist/js/iziToast.min.js"></script>
  <script src="../../js/patrimonio.js" defer></script>
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <img src="../../imagens/procaj.png" alt="PROCA Logo" class="logo" />
   <nav>
  <ul>
    <li>
      <a href="../dashboard/dashboard.html" class="dashboard active">
        <img src="../../imagens/icone-casa.png" alt="" class="menu-icone"/>
        <span class="link-texto">Dashboard</span>
      </a>
    </li>
    <li>
      <a href="../estoque/estoque.html" class="estoque">
        <img src="../../imagens/icone-caixa80.png" alt="" class="menu-icone"/>
        <span class="link-texto">Estoque</span>
      </a>
    </li>
     <li>
      <a href="../historico/hitorico.html" class="estoque">
        <img src="../../imagens/icone-hitorico.png" alt="" class="menu-icone"/>
        <span class="link-texto">Histórico</span>
      </a>
    </li>
      <li>
        <a href="../patrimonio/patrimonio.html" class="estoque">
          <img src="../../imagens/patrimonio.png" alt="" class="menu-icone"/>
          <span class="link-texto">Patrimônio</span>
        </a>
      </li>
      <li id="menu-cadastrar" style="display:none;">
        <a href="../Cadastro/cadastro.html" class="estoque">
          <img src="../../imagens/admin.png" alt="" class="menu-icone"/>
          <span class="link-texto">Admin</span>
        </a>
      </li>

      <li class="menu-item-inferior">
    </li>
  </ul>
</nav>
    </aside>

    <main class="main-content">
      <header class="header">
        <h1><strong>Patrimônio</strong></h1>
        <div class="user-menu">
          <span id="user-name">Olá, Usuário</span>
          <div class="dropdown" id="user-dropdown">
            <button id="logout-btn">Sair</button>
          </div>
          <img src="../../imagens/icone-conta.png" alt="Usuário" id="user-icon">
        </div>
      </header>

      <div class="toolbar">
        <div class="search-container">
          <input type="text" placeholder="Pesquisar..." class="search-bar" id="filtro-pesquisa">
        </div>
        <div class="actions">
          <button type="button" class="btn entrada" id="btn-abrir-criar">
            <img src="../../imagens/icone-soma.png" alt="Cadastrar">
            <span>Cadastrar Patrimônio</span>
          </button>
          <button type="button" class="btn filtrar" id="btn-abrir-filtro">
            <img src="../../imagens/icone-opçoes.png" alt="Filtrar">
            <span>Filtrar</span>
          </button>
          
          <button type="button" class="btn filtrar" id="btn-exportar" title="Exportar patrimônio">
            <span>Exportar</span>
          </button>
        </div>
      </div>

      <section class="table-wrapper">
        <table class="tabela-estoque">
  <thead>
    <tr>
      <th>Nº Tombo</th>
      <th>Nome</th>
      <th>Local</th>
      <th>Responsável</th>
      <th>Estado</th>
      <th>Preço (R$)</th>
      <th>Nota Fiscal</th>
      <th>Imagem</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody id="corpo-tabela"></tbody>
</table>
      </section>

      <div class="paginacao-container">
        <button id="btn-anterior" class="btn-paginacao">&lt;</button>
        <button id="btn-proximo" class="btn-paginacao">&gt;</button>
      </div>
    </main>
  </div>

  <div id="modal-criar-container" class="modal-container">
    <div class="modal">
      <button id="fechar-criar" class="fechar-modal">&times;</button>
      <h2>Cadastrar Novo Patrimônio</h2>
      <form id="form-criar-patrimonio">
        <div class="form-group">
          <label for="numero-tombo">Número do Tombo (ID)</label>
          <input type="number" id="numero-tombo" name="numeroTombo" min="1">
        </div>
        <div class="form-group">
          <label for="numero-nota-fiscal">Número da Nota Fiscal</label>
          <input type="text" id="numero-nota-fiscal" name="numeroNotaFiscal" placeholder="Ex.: 12345-ABC">
        </div>
        <div class="form-group">
          <label for="nome-patrimonio">Nome</label>
          <input type="text" id="nome-patrimonio" name="nome" required>
        </div>
        <div class="form-group">
          <label for="local-patrimonio">Local</label>
          <input type="text" id="local-patrimonio" name="local" required>
        </div>
        <div class="form-group">
          <label for="responsavel-patrimonio">Responsável</label>
          <input type="text" id="responsavel-patrimonio" name="responsavel" required>
        </div>
        <div class="form-group">
          <label for="estado-patrimonio">Estado</label>
          <select id="estado-patrimonio" name="estado" required>
            <option value="">Selecione...</option>
            <option value="Ótimo">Ótimo</option>
            <option value="Bom">Bom</option>
            <option value="Regular">Regular</option>
            <option value="Ruim">Ruim</option>
          </select>
        </div>
        <div class="form-group">
          <label for="imagem-patrimonio">Imagem (opcional)</label>
          <input type="file" id="imagem-patrimonio" name="imagem" accept="image/*">
        </div>
        <div class="form-group">
          <label for="preco">Preço (R$)</label>
          <input id="preco" name="preco" type="text" inputmode="decimal" placeholder="0,00" />
        </div>
        <button type="submit" class="btn-salvar">Salvar Patrimônio</button>
      </form>
    </div>
  </div>

  <!-- Modal Filtro -->
  <div id="modal-filtro-container" class="modal-container">
    <div class="modal">
      <button id="fechar-filtro-modal" class="fechar-modal">&times;</button>
      <h2>Opções de Filtro</h2>
      <form id="form-filtro">
        <div class="form-filtro">
          <label for="filtro-estado">Filtrar por Estado</label>
          <select id="filtro-estado">
            <option value="">Todos</option>
            <option value="Ótimo">Ótimo</option>
            <option value="Bom">Bom</option>
            <option value="Regular">Regular</option>
            <option value="Ruim">Ruim</option>
          </select>
        </div>
        <div class="filtro-actions">
          <button type="button" id="btn-limpar-filtro" class="btn-limpar">Limpar Filtros</button>
          <button type="submit" class="btn-salvar">Aplicar Filtro</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Transferir -->
  <div id="modal-transferir-container" class="modal-container">
    <div class="modal">
      <button id="fechar-transferir" class="fechar-modal">&times;</button>
      <h2>Transferir Patrimônio</h2>
      <form id="form-transferir-patrimonio">
        <input type="hidden" id="transferir-id" name="id">
        <div class="form-group">
          <label for="novo-local">Novo Local</label>
          <input type="text" id="novo-local" name="novoLocal" required>
        </div>
        <div class="form-group">
          <label for="novo-responsavel">Novo Responsável</label>
          <input type="text" id="novo-responsavel" name="novoResponsavel" required>
        </div>
        <div class="form-group">
          <label for="observacao">Observação</label>
          <textarea id="observacao" name="observacao"></textarea>
        </div>
        <button type="submit" class="btn-salvar">Confirmar Transferência</button>
      </form>
    </div>
  </div>

  <!-- Modal Detalhes -->
  <div id="modal-detalhes-container" class="modal-container">
    <div class="modal">
      <button id="fechar-detalhes" class="fechar-modal">&times;</button>
      <h2>Detalhes do Patrimônio</h2>
      <div id="detalhes-conteudo"></div>
    </div>
  </div>

  <!-- Modal Editar Número do Tombo -->
  <div id="modal-editar-numero-container" class="modal-container">
    <div class="modal">
      <button id="fechar-editar-numero" class="fechar-modal">&times;</button>
      <h2>Editar Patrimônio</h2>
      <form id="form-editar-numero">
        <input type="hidden" id="editar-numero-id-atual" name="idAtual">
        <div class="form-group">
          <label for="editar-numero-atual">Número atual</label>
          <input type="text" id="editar-numero-atual" disabled>
        </div>
        <div class="form-group">
          <label for="editar-novo-numero">Novo número do tombo</label>
          <input type="number" id="editar-novo-numero" name="novoNumero" min="1" placeholder="Deixe vazio para manter o atual">
        </div>
        <div class="form-group">
          <label for="editar-numero-nota-fiscal">Número da Nota Fiscal</label>
          <input type="text" id="editar-numero-nota-fiscal" name="numeroNotaFiscal" placeholder="Ex.: 12345-ABC">
        </div>
        <div class="form-group">
          <label for="editar-nome-patrimonio">Nome</label>
          <input type="text" id="editar-nome-patrimonio" name="nome" required>
        </div>
        <div class="form-group">
          <label for="editar-local-patrimonio">Local</label>
          <input type="text" id="editar-local-patrimonio" name="local" required>
        </div>
        <div class="form-group">
          <label for="editar-responsavel-patrimonio">Responsável</label>
          <input type="text" id="editar-responsavel-patrimonio" name="responsavel" required>
        </div>
        <div class="form-group">
          <label for="editar-estado-patrimonio">Estado</label>
          <select id="editar-estado-patrimonio" name="estado" required>
            <option value="">Selecione...</option>
            <option value="Ótimo">Ótimo</option>
            <option value="Bom">Bom</option>
            <option value="Regular">Regular</option>
            <option value="Ruim">Ruim</option>
          </select>
        </div>
        <div class="form-group">
          <label for="editar-imagem-patrimonio">Imagem (opcional)</label>
          <input type="file" id="editar-imagem-patrimonio" name="imagem" accept="image/*">
        </div>
        <div class="form-group">
          <label for="editar-preco">Preço (R$)</label>
          <input id="editar-preco" name="preco" type="text" inputmode="decimal" placeholder="0,00" />
        </div>
        <button type="submit" class="btn-salvar">Salvar</button>
      </form>
    </div>
  </div>
  <div id="modal-exportar-container" class="modal-container">
    <div class="modal">
        <div class="modal-header">
            <h3>Exportar Patrimônio</h3>
            <button id="fechar-exportar-modal" class="close-btn"></button>
        </div>
        <form id="form-exportar" class="modal-form">
            <div class="form-group">
                <label for="estado-export">Estado</label>
                <select id="estado-export">
                    <option value="">Todos os estados</option>
                    <option value="Ótimo">Ótimo</option>
                    <option value="Bom">Bom</option>
                    <option value="Regular">Regular</option>
                    <option value="Ruim">Ruim</option>
                </select>
            </div>

            <div class="form-group">
                <label for="localizacao-export">Localização</label>
                <input type="text" id="localizacao-export" placeholder="Ex: Sala 1, Almoxarifado...">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="data-inicio">Data de Cadastro - Início</label>
                    <input type="date" id="data-inicio">
                </div>
                <div class="form-group">
                    <label for="data-fim">Data de Cadastro - Fim</label>
                    <input type="date" id="data-fim">
                </div>
            </div>

            <div class="form-actions">
                <button type="button" id="cancelar-exportar" class="btn-secondary">Cancelar</button>
                <button type="submit" class="btn-primary">Baixar Planilha</button>
            </div>
        </form>
    </div>
  </div>
</body>
</html>
