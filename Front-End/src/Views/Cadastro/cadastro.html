 <div class="dashboard-container">
  <h1 class="card-title"><strong>Administrador</strong></h1>
  <div class="container">

      <div class="card">
        <div class="card-left">
          <img src="../../imagens/procaj.png" alt="PROCA Logo" class="logo" />
          <div class="toggle-section">
            <h3 class="highlighted-login" id="cardLeftHeading">
              <strong><span class="special-Text">Novo</span> Cadastro</strong>
            </h3>
            <button id="toggleButton" class="toggle-button" title="Alternar formulário">
              <img class="seta" src="../../imagens/setas-duplas.png" alt="" />
            </button>
          </div>
          <div class="welcome-text">
            <h1 class="main-welcome">BEM-VINDO</h1>
            <p class="sub-welcome">Cadastre aqui o novo membro.</p>
          </div>
        </div>

        <div class="card-right">
          <h2 id="currentFormTitle">Cadastra-Se</h2>
          <form id="loginForm">
            <div class="input-group">
              <img src="../../imagens/ícone usuário.png" alt="Ícone de Usuário" class="icon input-icon" />
              <div class="input-wrapper">
                <span class="input-line"></span>
                <input type="text" id="usernameLogin" placeholder="USUÁRIO" required />
              </div>
            </div>

            <div class="input-group">
              <img src="../../imagens/nome.png" alt="Ícone de Email" class="icon input-icon" />
              <div class="input-wrapper">
                <span class="input-line"></span>
                <input type="text" id="username" placeholder="NOME" required />
              </div>
            </div>

      <div class="input-group password-group">
  <img src="../../imagens/ícone senha.png" alt="Ícone de Senha" class="icon input-icon2" />
  <div class="input-wrapper">
    <span class="input-line"></span>
    <input type="password" id="passwordLogin" placeholder="*********" required />
    <button type="button" id="togglePassword" class="toggle-password">
      <img src="../../imagens/ícone do olho com corte.png" alt="Mostrar senha" id="eyeIcon" />
    </button>
  </div>
</div>

       
            <button type="submit" class="enter-button">Entrar</button>
          </form>

          <div class="social-icons">
            <a href="#" aria-label="WhatsApp"><img src="../../imagens/whatsapp.png" alt="WhatsApp" /></a>
            <a href="#" aria-label="Facebook"><img src="../../imagens/facebook.png" alt="Facebook" /></a>
            <a href="#" aria-label="Instagram"><img src="../../imagens/instagram.png" alt="Instagram" /></a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script defer src="../../js/cadastro.js"></script>
