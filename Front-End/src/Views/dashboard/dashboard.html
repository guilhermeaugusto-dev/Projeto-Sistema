<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="../historico/hitorico.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../../js/dashboard.js"></script>  
</head>
<body>

    <div class="dashboard-container">
 <aside class="sidebar">
    <img src="../../imagens/procaj.png" alt="PROCA Logo" class="logo" />
 <nav>
  <ul>
    <li>
      <a href="../dashboard/dashboard.html" class="dashboard active">
        <img src="../../imagens/icone-casa.png" alt="" class="menu-icone"/>
        <span class="link-texto">Dashboard</span>
      </a>
    </li>
    <li>
      <a href="../estoque/estoque.html" class="estoque">
        <img src="../../imagens/icone-caixa80.png" alt="" class="menu-icone"/>
        <span class="link-texto">Estoque</span>
      </a>
    </li>
     <li>
      <a href="../historico/hitorico.html" class="estoque">       
        <img src="../../imagens/icone-hitorico.png" alt="" class="menu-icone"/>
        <span class="link-texto">Histórico</span>
      </a>
    </li>
       <li>
            <a href="../patrimonio/patrimonio.html" class="estoque">
              <img src="../../imagens/icone-patrimonio.png" alt="" class="menu-icone"/>
              <span class="link-texto">Patrimônio</span>
            </a>
          </li>
 <li id="menu-cadastrar" style="display:none;">
            <a href="../Cadastro/cadastro.html" class="estoque">
              <img src="../../imagens/admin.png" alt="" class="menu-icone"/>
              <span class="link-texto">Admin</span>
            </a>
          </li>
  </ul>
</nav>
</aside>

        <main class="main-content">
          <header class="header">
    <h1><strong>Dashboard</strong></h1>

    <div class="user-menu">
      <span id="user-name">Olá, Usuário</span>
      <div class="dropdown" id="user-dropdown">
        <button id="logout-btn">Sair</button>
      </div>
      <img src="../../imagens/icone-conta.png" alt="Usuário" id="user-icon">
    </div>
  </header>

            <section class="kpi-cards">
                <div class="card clientes">
                    <div class="valor-container">
                        <img src="../../imagens/icone-ususarios.png" alt="" class="card-imagem">
                        <span class="value">9.999</span>
                    </div>
                    <span class="label">Usuários</span>
                </div>

                <div class="card produtos">
                    <div class="valor-container">
                        <img src="../../imagens/icone-caixa80.png" alt="" class="card-imagem">
                        <span class="value">9.999</span>
                    </div>
                    <span class="label">Produtos</span>
                </div>

                <div class="card vendas">
                    <div class="valor-container">
                        <img src="../../imagens/icone-grafico-seta-aumento.png" alt="" class="card-imagem">
                        <span class="value">9.999</span>
                    </div>
                    <span class="label">Entradas Mensais</span>
                </div>

                <div class="card receita">
                    <div class="valor-container">
                        <img src="../../imagens/icone-saidas.png" alt="" class="card-imagem">
                        <span class="value">999.999</span>
                    </div>
                    <span class="label">Saídas Mensais</span>
                </div>
            </section>

            <section class="charts-area">
                <div class="chart-container">
                    <h2>Entradas e Saídas Mensais</h2>
                    <canvas id="vendasMensaisChart"></canvas>
                </div>
                <div class="chart-container">
                    <h2>Categorias</h2>
                    <canvas id="categoriasChart"></canvas>
                </div>
            </section>  
        </main>
    </div>

</body>
</html>
